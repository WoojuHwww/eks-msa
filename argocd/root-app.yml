apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: msa-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/WoojuHwww/eks-solo-project
    targetRevision: main
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namesspace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true